<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title">
      <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
      <p class="site-subtitle">Hinoura Blog</p>
    </div>
    <a class="github-link" href="{{ site.repo }}" target="_blank" rel="noopener">GitHub</a>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer>
  <p>&copy; 2026 Hinoura Blog. Built with GitHub Pages.</p>
</footer>

</body>
</html>
